<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <script>
    // Grab the image URL from query string: ?img=<encoded_cloudinary_url>
    const params = new URLSearchParams(window.location.search);
    const imgUrl = params.get("img") || "";
    const title = params.get("title") || "ShutterWala - Inspection Image";
    const desc = params.get("desc") || "New inspection request image shared via ShutterWala.";

    // Dynamically inject the OG meta tags
    const metas = [
      { property: "og:type", content: "website" },
      { property: "og:title", content: title },
      { property: "og:description", content: desc },
      { property: "og:image", content: imgUrl },
      { property: "og:image:width", content: "600" },
      { property: "og:image:height", content: "400" },
      { property: "og:image:type", content: "image/jpeg" },
      { name: "twitter:card", content: "summary_large_image" },
      { name: "twitter:image", content: imgUrl },
      { name: "twitter:title", content: title },
    ];

    metas.forEach(({ property, name, content }) => {
      const tag = document.createElement("meta");
      if (property) tag.setAttribute("property", property);
      if (name) tag.setAttribute("name", name);
      tag.setAttribute("content", content);
      document.head.appendChild(tag);
    });

    // Also set the page title
    document.title = title;
  </script>

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      background: #0a0a0a;
      color: #fff;
      font-family: system-ui, sans-serif;
      text-align: center;
      padding: 2rem;
    }
    img {
      max-width: min(600px, 100%);
      max-height: 70vh;
      border-radius: 12px;
      object-fit: contain;
      border: 1px solid rgba(255,255,255,0.1);
      box-shadow: 0 20px 60px rgba(0,0,0,0.6);
    }
    p { margin-top: 1.5rem; color: rgba(255,255,255,0.5); font-size: 0.875rem; }
    a { color: #f97316; text-decoration: none; }
    .loader { color: rgba(255,255,255,0.5); font-size: 1rem; }
  </style>
</head>
<body>
  <div id="content">
    <p class="loader">Loading preview...</p>
  </div>

  <script>
    const params2 = new URLSearchParams(window.location.search);
    const img = params2.get("img");

    if (img) {
      const content = document.getElementById("content");
      content.innerHTML = `
        <img src="${img}" alt="Inspection Image" onerror="this.style.display='none'" />
        <p>Inspection image from <a href="/">ShutterWala</a></p>
      `;
    } else {
      document.getElementById("content").innerHTML = `<p>No image provided.</p>`;
    }
  </script>
</body>
</html>
